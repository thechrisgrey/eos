<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#111118"/>
      <stop offset="100%" stop-color="#06060a"/>
    </radialGradient>
    <radialGradient id="core" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- Outer ring segments (6 sectors of the EOS wheel) -->
  <g fill="none" stroke-width="3" stroke-linecap="round" opacity="0.5" filter="url(#glow)">
    <path d="M32 8 A24 24 0 0 1 52.8 20" stroke="#a78bfa"/>
    <path d="M52.8 20 A24 24 0 0 1 52.8 44" stroke="#38bdf8"/>
    <path d="M52.8 44 A24 24 0 0 1 32 56" stroke="#4ade80"/>
    <path d="M32 56 A24 24 0 0 1 11.2 44" stroke="#f59e0b"/>
    <path d="M11.2 44 A24 24 0 0 1 11.2 20" stroke="#f472b6"/>
    <path d="M11.2 20 A24 24 0 0 1 32 8" stroke="#76b900"/>
  </g>

  <!-- Inner ring -->
  <circle cx="32" cy="32" r="15" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

  <!-- Core circle with accent glow -->
  <circle cx="32" cy="32" r="9" fill="url(#core)" filter="url(#glow)"/>

  <!-- Center dot -->
  <circle cx="32" cy="32" r="3" fill="#fff" opacity="0.9"/>

  <!-- Spokes connecting core to ring -->
  <g stroke="rgba(255,255,255,0.12)" stroke-width="0.75">
    <line x1="32" y1="23" x2="32" y2="10"/>
    <line x1="39.8" y1="27" x2="51" y2="19"/>
    <line x1="39.8" y1="37" x2="51" y2="45"/>
    <line x1="32" y1="41" x2="32" y2="54"/>
    <line x1="24.2" y1="37" x2="13" y2="45"/>
    <line x1="24.2" y1="27" x2="13" y2="19"/>
  </g>
</svg>
