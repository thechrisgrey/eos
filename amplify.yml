version: 1
appRoot: frontend
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
    build:
      commands:
        - VITE_API_ENDPOINT=https://m945b8j1le.execute-api.us-east-1.amazonaws.com npm run build
  artifacts:
    baseDirectory: dist
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
